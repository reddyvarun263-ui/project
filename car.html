<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Showroom</title>

    <style>
        :root {
            --main-color: rgb(219, 151, 15);
            --dark: black;
            --light: white;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(120deg, #f6f9fc, #e9eff5);
        }


        header {
            background: var(--dark);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            color: var(--main-color);
        }


        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            position: relative;
        }

        nav a::after {

            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 3px;
            background: var(--main-color);
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        .section-title {
            text-align: center;
            margin: 40px 0;
            font-size: 32px;
            color: #333;
        }

        .bike-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            padding: 20px 60px;
        }

        .bike-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            text-align: center;
            transition: 0.4s;
            position: relative;
        }

        .bike-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
        }

        .bike-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: 0.5s;
        }

        .bike-card:hover img {
            transform: scale(1.1);
        }

        .price {
            color: red;
            font-weight: bold;
            margin-bottom: 10px;
        }


        button {
            background: var(--main-color);
            border: none;
            padding: 10px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.4s;
        }

        button:hover {
            background: black;
            color: white;
            letter-spacing: 1px;
            transform: scale(1.1);
        }


        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }


        @media(max-width:768px) {

            header {
                flex-direction: column;
            }

            .bike-container {
                padding: 20px;
            }

            .section-title {
                font-size: 26px;
            }

        }
    </style>
</head>

<body>
    <main>
        <header>
