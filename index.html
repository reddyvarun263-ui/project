<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>car Showroom Home</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --main-color: rgb(219, 151, 15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }



        header {
            background: black;
            padding: 15px 40px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        header h1 {
            color: var(--main-color);
            font-weight: bold;
        }

        nav a {
            color: white;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
            margin-left: 20px;
        }

        nav a:hover {
            color: var(--main-color);
        }

        nav a {
            color: rgb(242, 237, 237);
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
        }


        .carousel,
        .carousel-inner,
        .carousel-item {
            height: 100vh;
        }

        .carousel-item img {
            height: 100vh;
            width: 100%;
            object-fit: cover;
        }

    

        .home-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
        }

        .home-content h2 {
            font-size: 70px;
            color: var(--main-color);
            font-weight: bold;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>

<body>

    <header>
        <nav>

            <a href="car.html">Cars</a>
        </nav>
    </header>

    <!-- Carousel -->

    <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://luxurycarsmag.com/wp-content/uploads/2024/08/2024-Rolls-Royce-Phantom.jpg"
                    class="d-block w-100">
            </div>

            <div class="carousel-item">
                <img src="https://tse1.mm.bing.net/th/id/OIP.BFwZWR9Ip90aipyJYS-XngHaE8?pid=Api&h=220&P=0"
                    class="d-block w-100">
            </div>

            <div class="carousel-item">
                <img src="https://tse2.mm.bing.net/th/id/OIP.8L4jNe7vebsMN5bs6FzhDgHaEK?pid=Api&h=220&P=0"
                    class="d-block w-100">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>



    <div class="home-content">
        <h2> Cars Showroom</h2>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
